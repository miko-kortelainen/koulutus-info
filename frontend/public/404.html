<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect trick for GitHub Pages + BrowserRouter
      // Encode the path into the query string, then redirect to index.html
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 2).join("/") +
        "/?p=" + encodeURIComponent(l.pathname.slice(1) + l.search) +
        (l.hash || "")
      );
    </script>
  </head>
</html>
